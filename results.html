<!DOCTYPE html>
<html>
<body>
    <h1>Voting Results</h1>
    
    <table border="1">
        <thead>
            <tr>
                <th>Group Name</th>
                <th>Total Votes</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
            <tr>
                <td>{{ row['group_name'] }}</td>
                <td>{{ row['total'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <p><a href="/">Back to Vote</a></p>
</body>
</html>
